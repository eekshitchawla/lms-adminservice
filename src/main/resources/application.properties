spring.application.name=adminservice
server.port=${PORT:8082}
# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres?sslmode=require}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Allow app to start without database
spring.datasource.hikari.initialization-fail-timeout=0

# JWT Configuration
jwt.secret=${JWT_SECRET:MyVerySecureSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Redis Configuration (Optional for OTP caching)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
# Disable Redis if connection fails
spring.redis.client-name=admin-service-client

# Email Configuration (optional, for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.root=INFO
logging.level.com.eeki.adminservice=DEBUG
